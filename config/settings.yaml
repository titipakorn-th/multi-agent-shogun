language: en
shell: bash
topology: v2
# Suffix for tmux sessions (e.g. shogun_suffix, multiagent_suffix).
# Options:
#   "auto"  - Auto-detect from folder name suffix (e.g. multi-agent-shogun-safepay -> _safepay)
#   ""      - Force no suffix (uses "shogun" and "multiagent")
#   "_name" - Force a specific suffix
tmux_session_suffix: auto
skill:
  save_path: ~/.claude/skills/
  local_path: ./skills/
logging:
  level: info
  path: ./logs/
auto_prompt:
  # Auto-dispatch next pending plan task after cmd completes.
  # See instructions/shogun.md → "Auto-Prompt on Task Completion".
  # Design principle: auto_prompt exists to break the project-wide
  # ask-Lord-then-wait cycle. Shogun makes the call, Lord sees results.
  enabled: true
  # Loop safety — cap dispatches within a session. Raised from 5 to 20:
  # Lord wants sustained autonomous work, not micro-cap that re-triggers
  # the ask-Lord pattern.
  max_dispatches_per_session: 20
  # When no plan has pending work, Shogun goes silent (does NOT ping Lord).
  # Lord learns: write a plan to keep Shogun busy.
  prompt_when_no_plans: false
telegram:
  # Telegram routing mode — controls WHERE Lord-facing communication goes.
  # Default "on" because Lord is on Telegram most of the time.
  # When "off": all Lord-facing output → tmux/CLI only (no Telegram sends).
  #            All Lord-facing questions → terminal stdin/stdout (no Telegram).
  # When "on":  all Lord-facing output → scripts/ntfy.sh (Telegram).
  #            All Lord-facing questions → scripts/lord_ask.sh → Telegram.
  # Direct callers of scripts/ntfy.sh and scripts/lord_ask.sh honor this
  # flag. Other scripts that send to Telegram directly (e.g.
  # scripts/telegram_listener.py for receive-side) are unchanged.
  # See instructions/shogun.md → "Response Channel Mode (telegram.mode)".
  mode: on
cli:
  default: claude
roles:
  shogun:
    model: opus
    cli_variant: claude
    pane_target: shogun:main.0
    color: "#002b36"
    title: shogun
    prompt_path: instructions/shogun.md
    temperature: 0.1
    skills:
      - zoom-out
      - grill-with-docs
    permissions_override: {}
  orchestrator:
    model: opus
    cli_variant: claude
    pane_target: multiagent:ops.0
    color: "#501515"
    title: orchestrator
    prompt_path: instructions/orchestrator.md
    temperature: 0.1
    skills: []
    permissions_override:
      read_allow:
        - queue/inbox/orchestrator.yaml
        - queue/tasks/*.yaml
        - queue/reports/*.yaml
        - context/*
        - dashboard.md
      edit_allow:
        - queue/tasks/*.yaml
        - queue/tasks/pending.yaml
        - dashboard.md
      edit_deny:
        - queue/reports/*.yaml
  explorer:
    model: sonnet
    cli_variant: claude
    pane_target: multiagent:research.0
    color: "#454510"
    title: explorer
    prompt_path: instructions/explorer.md
    temperature: 0.1
    skills:
      - codemap
    permissions_override:
      read_allow:
        - context/*
      edit_deny:
        - "**/*"
  librarian:
    model: sonnet
    cli_variant: claude
    pane_target: multiagent:research.1
    color: "#503515"
    title: librarian
    prompt_path: instructions/librarian.md
    temperature: 0.2
    skills:
      - web-search
      - doc-fetch
    permissions_override:
      edit_deny:
        - "**/*"
  oracle:
    model: opus
    cli_variant: claude
    pane_target: multiagent:research.2
    color: "#9e7c0a"
    title: oracle
    prompt_path: instructions/oracle.md
    temperature: 0.1
    skills:
      - grill-with-docs
    permissions_override:
      edit_deny:
        - "**/*"
  designer:
    model: sonnet
    cli_variant: claude
    pane_target: multiagent:ops.2
    color: "#3a1e3a"
    title: designer
    prompt_path: instructions/designer.md
    temperature: 0.3
    skills:
      - frontend-design
    permissions_override: {}
  fixer:
    model: sonnet
    cli_variant: claude
    pane_target: multiagent:ops.1
    color: "#1e3a1e"
    title: fixer
    prompt_path: instructions/fixer.md
    temperature: 0.2
    skills:
      - subagent-driven-development
    permissions_override: {}
  observer:
    model: sonnet
    cli_variant: claude
    pane_target: multiagent:ops.3
    color: "#1e3a3a"
    title: observer
    prompt_path: instructions/observer.md
    temperature: 0.2
    skills: []
    permissions_override:
      edit_deny:
        - "**/*"
  council:
    model: opus
    cli_variant: claude
    pane_target: multiagent:research.3
    color: "#353535"
    title: council
    prompt_path: instructions/council.md
    temperature: 0.1
    skills: []
    permissions_override:
      edit_deny:
        - "**/*"
